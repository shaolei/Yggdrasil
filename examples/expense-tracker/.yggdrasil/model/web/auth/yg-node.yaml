name: Auth Pages
type: module
description: "Login, register, and landing pages for unauthenticated users"

relations:
  - target: api/auth
    type: calls
    consumes: [POST /auth/register, POST /auth/login]

mapping:
  paths:
    - apps/web/src/pages/Landing.tsx
    - apps/web/src/pages/Login.tsx
    - apps/web/src/pages/Register.tsx
