name: Settings
type: module
description: "User profile, password change, and subscription management pages"

aspects:
  - aspect: requires-auth

relations:
  - target: api/users
    type: calls
    consumes: [PUT /users/me/password]
  - target: api/subscriptions
    type: calls
    consumes: [GET /subscriptions/me, POST /subscriptions/upgrade]

mapping:
  paths:
    - apps/web/src/pages/Settings.tsx
    - apps/web/src/pages/Subscription.tsx
