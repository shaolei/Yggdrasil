name: Dashboard
type: module
description: "Main overview page: monthly summary, top categories, and recent expenses"

aspects:
  - aspect: requires-auth

relations:
  - target: api/reports
    type: calls
    consumes: [GET /reports/summary]
  - target: api/expenses
    type: calls
    consumes: [GET /expenses]

mapping:
  paths:
    - apps/web/src/pages/Dashboard.tsx
