name: Expense Pages
type: module
description: "Expense list, add, and edit pages with budget overage warnings"

aspects:
  - aspect: requires-auth
  - aspect: subscription-limits

relations:
  - target: api/expenses
    type: calls
    consumes: [GET /expenses, GET /expenses/:id, POST /expenses, PUT /expenses/:id, DELETE /expenses/:id]
  - target: api/categories
    type: calls
    consumes: [GET /categories]

mapping:
  paths:
    - apps/web/src/pages/Expenses.tsx
    - apps/web/src/pages/AddExpense.tsx
    - apps/web/src/pages/EditExpense.tsx
