name: Expenses
type: service
description: "Expense CRUD with subscription limit enforcement and budget overage detection"

aspects:
  - aspect: requires-auth
    anchors:
      - requireAuth
  - aspect: validation
    anchors:
      - expenseSchema
  - aspect: error-format
    anchors:
      - EXPENSE_LIMIT
      - NOT_FOUND
  - aspect: subscription-limits
    anchors:
      - EXPENSE_LIMIT
      - plan

relations:
  - target: api/db
    type: uses
    consumes: [db.prepare, db.run]
  - target: api/auth
    type: uses
    consumes: [requireAuth]

mapping:
  paths:
    - apps/api/src/routes/expenses.ts
    - apps/api/src/services/expenses.ts
