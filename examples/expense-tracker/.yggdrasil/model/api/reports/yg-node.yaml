name: Reports
type: service
description: "Read-only spending aggregation: monthly summary and per-category breakdown"

aspects:
  - aspect: requires-auth
    anchors:
      - requireAuth
  - aspect: error-format

relations:
  - target: api/db
    type: uses
    consumes: [db.prepare]
  - target: api/auth
    type: uses
    consumes: [requireAuth]

mapping:
  paths:
    - apps/api/src/routes/reports.ts
    - apps/api/src/services/reports.ts
