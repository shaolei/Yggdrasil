name: Users
type: service
description: "User profile and account operations: profile fetch and password change"

aspects:
  - aspect: requires-auth
    anchors:
      - requireAuth
  - aspect: validation
    anchors:
      - changePasswordSchema
  - aspect: error-format
    anchors:
      - INVALID_PASSWORD

relations:
  - target: api/db
    type: uses
    consumes: [db.prepare, db.run]
  - target: api/auth
    type: uses
    consumes: [requireAuth]

mapping:
  paths:
    - apps/api/src/routes/users.ts
    - apps/api/src/services/users.ts
