name: Budgets
type: service
description: "Monthly budget limits per category with spent-amount computation"

aspects:
  - aspect: requires-auth
    anchors:
      - requireAuth
  - aspect: validation
    anchors:
      - budgetSchema
  - aspect: error-format

relations:
  - target: api/db
    type: uses
    consumes: [db.prepare, db.run]
  - target: api/auth
    type: uses
    consumes: [requireAuth]

mapping:
  paths:
    - apps/api/src/routes/budgets.ts
    - apps/api/src/services/budgets.ts
