<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yggdrasil - Your Repository Remembers</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Inter:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;width:100vw;height:100vh;font-family:'JetBrains Mono',monospace}

#start{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;cursor:pointer;background:#050508;transition:opacity .4s}
#start.gone{opacity:0;pointer-events:none}
#start span{font:13px 'Inter',sans-serif;color:#444;letter-spacing:4px;text-transform:uppercase;animation:p 2s ease-in-out infinite}
@keyframes p{0%,100%{opacity:.3}50%{opacity:.9}}

/* ===== TERMINAL ===== */
#screen{position:fixed;inset:0;display:flex;align-items:stretch;justify-content:center;padding:24px;opacity:0;transition:opacity .4s}
#screen.on{opacity:1}
#term-wrap{width:100%;max-width:900px;background:#0d1117;border:1px solid #1a1e26;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;position:relative;box-shadow:0 20px 80px rgba(0,0,0,.6)}
#term-head{padding:12px 16px;display:flex;gap:7px;align-items:center;border-bottom:1px solid #151920}
#term-head .dot{width:10px;height:10px;border-radius:50%;background:#1e2228}
#term-head .title{flex:1;text-align:center;font-size:11px;color:#333;letter-spacing:2px}
#term-body{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 16px;scroll-behavior:auto}
#term-body::-webkit-scrollbar{width:0}
.ln{font-size:clamp(10px,1.15vw,14px);line-height:1.6;white-space:pre-wrap;word-break:break-all;min-height:1em}
.ln.file{color:#58a6ff;opacity:.45}
.ln.repeat{color:#d29922;opacity:.7}
.ln .mark{color:#d29922;opacity:.5;font-size:.85em}
.ln.cmd{color:#e6e6e6}.ln .pr{color:#7ee787}
.ln.dim{color:#555;font-style:italic}
.ln.thought{color:rgba(255,255,255,.5);font-style:italic}
.ln.panic{color:#f85149;font-weight:600}
.ln.err{color:#f85149;font-weight:700;font-size:clamp(11px,1.3vw,16px)}
.ln.ok{color:#7ee787}
.ln.ok2{color:#7ee787;font-weight:600}
.ln.task{color:#f85149;letter-spacing:2px;font-weight:700;border-top:1px solid rgba(248,81,73,.2);border-bottom:1px solid rgba(248,81,73,.2);padding:4px 0;margin:4px 0}
.ln .pp{color:#bc8cff}.ln .bl{color:#58a6ff}.ln .ac{color:#7ee787}.ln .wh{color:#fff;font-weight:500}
.ln .cy{color:#79c0ff}.ln .ye{color:#d29922}

@keyframes jitter{0%{transform:translateX(0)}25%{transform:translateX(-1.5px)}50%{transform:translateX(2px)}75%{transform:translateX(-1px)}100%{transform:translateX(0)}}
#term-body.chaos .ln{animation:jitter .12s infinite}

/* ===== BIG TEXT ===== */
#big{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity .5s;pointer-events:none;text-align:center;padding:20px}
#big.on{opacity:1}
#big .line{font-family:'Inter',sans-serif;font-size:clamp(22px,4vw,56px);font-weight:700;color:#fff;line-height:1.4}
#big .line.dim{color:rgba(255,255,255,.35);font-weight:300}
#big .line.small{font-size:clamp(14px,2vw,28px);font-weight:400;color:#888}
#big .line.tiny{font-size:clamp(11px,1.3vw,18px);font-weight:300;color:#555;margin-top:8px}
#big .line .g{color:#7ee787}
#big .line .r{color:#f85149}
#big .line .b{color:#58a6ff}
#big .line .y{color:#d29922}
#big .line .cy{color:#79c0ff}
#big .line.huge{font-size:clamp(40px,8vw,100px);font-weight:900}

/* ===== STATS ===== */
.stats{display:flex;gap:clamp(20px,5vw,60px);flex-wrap:wrap;justify-content:center;margin-top:24px}
.stat{text-align:center}
.stat-num{font-family:'Inter',sans-serif;font-size:clamp(36px,6vw,72px);font-weight:900;color:#7ee787;line-height:1}
.stat-label{font-family:'Inter',sans-serif;font-size:clamp(10px,1.2vw,14px);color:#555;margin-top:6px;max-width:140px}
.stat-sub{font-family:'Inter',sans-serif;font-size:clamp(8px,.9vw,11px);color:#333;margin-top:2px}

/* ===== LOGO ===== */
#logo{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;opacity:0;transition:opacity 1s}
#logo.on{opacity:1}
.logo-wrap{display:flex;flex-direction:column;align-items:center}
.logo-wrap svg{width:clamp(55px,8vw,90px);margin-bottom:16px}
.logo-name{font:900 clamp(28px,5vw,64px)/1 'Inter',sans-serif;letter-spacing:8px;text-transform:uppercase;color:#fff}
.logo-sub{font:300 clamp(11px,1.3vw,16px)/1 'Inter',sans-serif;color:#555;margin-top:10px}
.logo-cmd{font:clamp(11px,1.1vw,14px)/1 'JetBrains Mono',monospace;color:#7ee787;margin-top:26px;padding:7px 18px;border:1px solid rgba(126,231,135,.18);border-radius:4px}
.logo-init{font:clamp(10px,1vw,13px)/1 'JetBrains Mono',monospace;color:#555;margin-top:12px}
.logo-init span{color:#58a6ff;transition:opacity .15s}
.logo-init span.swap{opacity:0}
.logo-tagline{font:600 clamp(13px,1.5vw,20px)/1.4 'Inter',sans-serif;color:#888;margin-top:28px;letter-spacing:1px}
.logo-details{font:300 clamp(9px,.9vw,12px)/1.4 'Inter',sans-serif;color:#333;margin-top:14px}

/* ===== EFFECTS ===== */
#flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:50;transition:opacity .08s}
#red-ov{position:fixed;inset:0;background:rgba(248,81,73,.04);opacity:0;pointer-events:none;z-index:4;transition:opacity .5s}
#vig{position:fixed;inset:0;pointer-events:none;z-index:3;box-shadow:inset 0 0 150px rgba(0,0,0,.4)}
#bar{position:fixed;bottom:0;left:0;height:2px;background:linear-gradient(90deg,#7ee787,#58a6ff);width:0;z-index:60}
</style>
</head>
<body>

<div id="screen">

    <div id="term-body"></div>
  </div>
</div>
<div id="big"></div>
<div id="logo">

  tick(){const t=this.x.currentTime,o=this.x.createOscillator(),g=this.x.createGain();o.type='sine';o.frequency.value=900;g.gain.setValueAtTime(.02,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);o.connect(g);g.connect(this.m);o.start(t);o.stop(t+.05)}
  hat(){const t=this.x.currentTime,bs=this.x.sampleRate*.03,bf=this.x.createBuffer(1,bs,this.x.sampleRate),d=bf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;const n=this.x.createBufferSource();n.buffer=bf;const hp=this.x.createBiquadFilter();hp.type='highpass';hp.frequency.value=9000;const g=this.x.createGain();g.gain.setValueAtTime(.05,t);g.gain.exponentialRampToValueAtTime(.001,t+.03);n.connect(hp);hp.connect(g);g.connect(this.m);n.start(t)}
  err(){const t=this.x.currentTime,o=this.x.createOscillator(),g=this.x.createGain();o.type='sawtooth';o.frequency.value=58;g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);o.connect(g);g.connect(this.m);o.start(t);o.stop(t+.25)}
  impact(){const t=this.x.currentTime,bs=this.x.sampleRate*.06,bf=this.x.createBuffer(1,bs,this.x.sampleRate),d=bf.getChannelData(0);for(let i=0;i<bs;i++)d[i]=Math.random()*2-1;const n=this.x.createBufferSource();n.buffer=bf;const g=this.x.createGain();g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);n.connect(g);g.connect(this.m);n.start(t);this.kick(1.3)}
  drone(f=42){const t=this.x.currentTime;this._do=this.x.createOscillator();this._dg=this.x.createGain();this._do.type='sine';this._do.frequency.value=f;this._dg.gain.value=.03;this._do.connect(this._dg);this._dg.connect(this.m);this._do.start(t)}
  riseDrone(f,d){const t=this.x.currentTime;if(this._do)this._do.frequency.linearRampToValueAtTime(f,t+d);if(this._dg)this._dg.gain.linearRampToValueAtTime(.06,t+d)}
  stopDrone(){if(this._dg){this._dg.gain.exponentialRampToValueAtTime(.001,this.x.currentTime+.3)}}
  pad(ff,d=5){const t=this.x.currentTime;for(const f of ff)for(const dt of[-2,0,2]){const o=this.x.createOscillator(),g=this.x.createGain();o.type='sine';o.frequency.value=f;o.detune.value=dt;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.025,t+1);g.gain.setValueAtTime(.025,t+d-1.5);g.gain.linearRampToValueAtTime(0,t+d);o.connect(g);g.connect(this.m);o.start(t);o.stop(t+d+.01)}}
  resolve(){this.note(261.63,.8,.04,'sine');setTimeout(()=>this.note(329.63,.8,.04,'sine'),100);setTimeout(()=>this.note(392,.8,.04,'sine'),200);setTimeout(()=>this.note(523.25,1.5,.05,'sine'),350)}
}

async function waterfall(list,speed=50){
  let c=0;
  for(const f of list){
    const repeat=seen.has(f);seen.add(f);
    const cls=repeat?'repeat':'file';
    const suf=repeat?' <span class="mark">  read before</span>':'';
    addLine('  '+f+suf,cls);
    if(c++%3===0)sfx.tick();
    await wait(speed);
  }
}

function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*i);[b[i],b[j]]=[b[j],b[i]]}return b}
