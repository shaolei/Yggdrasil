name: RateLimitGuard
type: infrastructure
aspects: [graceful-degradation]

relations:
  - target: rate-limiter/rate-limit-service
    type: calls
    consumes: [checkRateLimit, incrementCounter]
    failure: 'never — service handles Redis errors internally and never throws'
  - target: rate-limiter/rate-limit-config
    type: uses
    consumes: [resolveGroup]
    failure: 'never fails — config is in-memory'

mapping:
  paths:
    - src/rate-limiter/rate-limit.guard.ts
