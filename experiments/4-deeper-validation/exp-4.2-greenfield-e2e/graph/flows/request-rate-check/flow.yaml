name: Request Rate Check
aspects: [graceful-degradation]

participants:
  - node: rate-limiter/rate-limit-guard
    role: Intercepts incoming HTTP requests via NestJS guard pipeline, extracts user identity and resolves endpoint group, delegates rate check to service, sets response headers or rejects with 429.
  - node: rate-limiter/rate-limit-service
    role: Performs the sliding window rate limit check against Redis, increments counters for allowed requests, returns remaining quota information.
  - node: rate-limiter/rate-limit-config
    role: Provides endpoint group resolution and rate limit configuration (limits and window sizes per group).
