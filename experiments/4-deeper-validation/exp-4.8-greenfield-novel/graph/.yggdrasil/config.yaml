name: "Temporal Recipe Orchestrator"

stack:
  language: "TypeScript"
  runtime: "Node.js 22+"

standards: |
  Strict TypeScript. ESM modules (import/export). Vitest for tests.
  All time values in milliseconds internally; ISO 8601 for external APIs.
  Environmental conditions always validated against safe ranges before use.
  Reagent quantities use integer micrograms to avoid floating-point drift.
  All state transitions logged with timestamp and causal chain.

node_types:
  - name: module
  - name: service
  - name: library

artifacts:
  responsibility.md:
    required: always
    description: "What this node is responsible for, and what it is not"
    structural_context: true
  interface.md:
    required:
      when: has_incoming_relations
    description: "Public API — methods, parameters, return types, contracts, failure modes, exposed data structures"
    structural_context: true
  internals.md:
    required: never
    description: "How the node works and why — algorithms, business rules, state machines, design decisions with rejected alternatives"

quality:
  min_artifact_length: 50
  max_direct_relations: 10
  context_budget:
    warning: 10000
    error: 20000
