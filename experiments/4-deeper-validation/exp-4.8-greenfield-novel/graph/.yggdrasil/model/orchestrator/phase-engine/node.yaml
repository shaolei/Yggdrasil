name: PhaseEngine
type: service
aspects: [contamination-propagation, temporal-monotonicity]
blackbox: false

relations:
  - target: environment/condition-monitor
    type: calls
    consumes: [getConditions, subscribeToAlarms, calculateDurationAdjustment]
    failure: "condition-monitor unavailable: pause phase timer, wait for reconnection"

mapping:
  paths:
    - src/orchestrator/phase-engine.ts
