name: RecipeScheduler
type: service
aspects: [contamination-propagation, temporal-monotonicity, reagent-atomicity]
blackbox: false

relations:
  - target: orchestrator/phase-engine
    type: calls
    consumes: [startPhase, abortPhase, pausePhase]
    failure: "phase-engine unavailable: reject new submissions, existing recipes enter holding state"
  - target: inventory/reagent-manager
    type: calls
    consumes: [allocateReagents, releaseReagents]
    failure: "reagent-manager unavailable: pause phase transitions, retry with exponential backoff up to 30s"
  - target: environment/condition-monitor
    type: calls
    consumes: [getConditions, subscribeToAlarms]
    failure: "condition-monitor unavailable: pause all active phases (safety-first), resume when monitor reconnects"

mapping:
  paths:
    - src/orchestrator/scheduler.ts
