name: Auth Operations
type: module

aspects:
  - aspect: hook-lifecycle
  - aspect: session-management
  - aspect: brute-force-protection
    exceptions:
      - "Only login uses brute force protection. Other operations do not track attempts."
  - aspect: access-control-pattern
    exceptions:
      - "Login does not check access functions — it checks credentials instead. Access control applies to other operations like 'me' and 'access'."

relations:
  - target: auth/strategies
    type: calls
    consumes: [authenticateLocalStrategy, incrementLoginAttempts, resetLoginAttempts]
  - target: auth/sessions
    type: calls
    consumes: [addSessionToUser, revokeSession, removeExpiredSessions]
  - target: auth/jwt
    type: calls
    consumes: [jwtSign]
  - target: auth/fields-to-sign
    type: calls
    consumes: [getFieldsToSign]
  - target: auth/access-control
    type: calls
    consumes: [executeAccess]

mapping:
  paths:
    - packages/payload/src/auth/operations/
