name: Auth Strategies
type: module

aspects:
  - aspect: brute-force-protection
    exceptions:
      - "Only local/incrementLoginAttempts participates. JWT and API key strategies do not track attempts."

relations:
  - target: auth/jwt
    type: calls
    consumes: [extractJWT]

mapping:
  paths:
    - packages/payload/src/auth/strategies/
    - packages/payload/src/auth/executeAuthStrategies.ts
