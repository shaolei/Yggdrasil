name: Request
type: module

aspects:
  - aspect: lazy-evaluation
    anchors:
      - _authenticate
      - _load_data_and_files
      - _hasattr
      - Empty
  - aspect: policy-pattern
    exceptions:
      - "Request is a consumer of the policy pattern, not a provider — it holds authenticator instances but does not define the policy interface"

relations:
  - target: authentication
    type: uses
    consumes: [authenticate]

mapping:
  paths:
    - rest_framework/request.py
