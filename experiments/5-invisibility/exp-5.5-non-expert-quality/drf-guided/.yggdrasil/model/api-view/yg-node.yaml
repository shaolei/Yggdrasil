name: APIView
type: module

aspects:
  - aspect: policy-pattern
    anchors:
      - authentication_classes
      - permission_classes
      - throttle_classes
      - get_authenticators
      - get_permissions
      - get_throttles
  - aspect: class-based-configuration
    anchors:
      - api_settings
      - DEFAULT_AUTHENTICATION_CLASSES

relations:
  - target: request
    type: calls
    consumes: [Request]
  - target: authentication
    type: uses
    consumes: [BaseAuthentication]
  - target: permissions
    type: uses
    consumes: [BasePermission, has_permission, has_object_permission]
  - target: throttling
    type: uses
    consumes: [BaseThrottle, allow_request]

mapping:
  paths:
    - rest_framework/views.py
