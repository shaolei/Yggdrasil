version: "2.0.0"

name: "Caddy Reverse Proxy"

stack:
  language: "Go"
  runtime: "Go 1.22+"
  framework: "Caddy v2"

standards: "Caddy module pattern: CaddyModule(), Provision(), Validate(), Cleanup() lifecycle. JSON struct tags with caddy namespace annotations for module loading."

node_types:
  module:
    description: "Business logic unit with clear domain responsibility"
  service:
    description: "Component providing functionality to other nodes"
  library:
    description: "Shared utility code with no domain knowledge"
  infrastructure:
    description: "Cross-cutting infrastructure (middleware, guards, interceptors)"

artifacts:
  responsibility.md:
    required: always
    description: "What this node is responsible for, and what it is not"
    included_in_relations: true
  interface.md:
    required:
      when: has_incoming_relations
    description: "Public API — methods, parameters, return types, contracts"
    included_in_relations: true
  internals.md:
    required: never
    description: "How it works internally — algorithms, state, decisions"
    included_in_relations: false

quality:
  min_artifact_length: 50
  max_direct_relations: 10
  context_budget:
    warning: 10000
    error: 20000
