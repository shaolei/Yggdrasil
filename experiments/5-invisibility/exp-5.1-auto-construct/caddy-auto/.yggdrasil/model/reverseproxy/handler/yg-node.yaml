name: Handler
type: module

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - caddy.RegisterModule
      - CaddyModule
      - Provision
      - Cleanup
  - aspect: retry-with-health-tracking
    anchors:
      - proxyLoopIteration
      - countFailure
      - tryAgain

relations:
  - target: reverseproxy/selection-policies
    type: uses
    consumes: [Select]
  - target: reverseproxy/healthchecks
    type: uses
    consumes: [activeHealthChecker, countFailure]
  - target: reverseproxy/http-transport
    type: uses
    consumes: [RoundTrip]
  - target: reverseproxy/streaming
    type: uses
    consumes: [handleUpgradeResponse, copyResponse, cleanupConnections]
  - target: reverseproxy/upstreams
    type: uses
    consumes: [GetUpstreams]

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/reverseproxy.go
