name: Health Checks
type: module

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - Provision
    exceptions:
      - "Not a standalone Caddy module -- ActiveHealthChecks and PassiveHealthChecks are config structs provisioned by the Handler, not registered via caddy.RegisterModule()"

relations:
  - target: reverseproxy/handler
    type: uses
    consumes: [Upstreams, Transport, ctx]

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/healthchecks.go
