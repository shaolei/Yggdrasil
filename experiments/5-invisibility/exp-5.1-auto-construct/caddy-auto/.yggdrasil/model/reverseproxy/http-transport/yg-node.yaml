name: HTTP Transport
type: service

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - caddy.RegisterModule
      - CaddyModule
      - Provision
      - Cleanup

relations:
  - target: reverseproxy/handler
    type: uses
    consumes: [DialInfo, proxyProtocolInfoVarKey]

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/httptransport.go
