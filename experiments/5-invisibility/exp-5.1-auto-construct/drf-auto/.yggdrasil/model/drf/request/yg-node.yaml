name: Request
type: module

aspects:
  - aspect: lazy-authentication
    anchors:
      - _authenticate
      - wrap_attributeerrors
  - aspect: pluggable-policy
    exceptions:
      - "Request receives already-instantiated authenticators and parsers, rather than instantiating them itself"
    anchors:
      - authenticators
      - parsers

relations:
  - target: drf/authentication
    type: uses
    consumes: [BaseAuthentication.authenticate]

mapping:
  paths:
    - rest_framework/request.py
