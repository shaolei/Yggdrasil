name: APIView
type: module

aspects:
  - aspect: pluggable-policy
    anchors:
      - authentication_classes
      - permission_classes
      - throttle_classes
      - get_authenticators
      - get_permissions
      - get_throttles
  - aspect: lazy-authentication
    anchors:
      - perform_authentication
  - aspect: csrf-session-enforcement
    anchors:
      - csrf_exempt

relations:
  - target: drf/request
    type: calls
    consumes: [Request, clone_request]
  - target: drf/authentication
    type: uses
    consumes: [BaseAuthentication.authenticate_header]
  - target: drf/permissions
    type: uses
    consumes: [BasePermission.has_permission, BasePermission.has_object_permission]
  - target: drf/throttling
    type: uses
    consumes: [BaseThrottle.allow_request, BaseThrottle.wait]

mapping:
  paths:
    - rest_framework/views.py
