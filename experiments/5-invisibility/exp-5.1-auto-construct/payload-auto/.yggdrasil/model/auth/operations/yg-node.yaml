name: Auth Operations
type: module

aspects:
  - aspect: hook-lifecycle
  - aspect: account-lockout
  - aspect: parallel-safety

relations:
  - target: auth/strategies
    type: calls
    consumes: [authenticateLocalStrategy, incrementLoginAttempts, resetLoginAttempts]
  - target: auth/token-management
    type: calls
    consumes: [jwtSign, getFieldsToSign, addSessionToUser, revokeSession, generatePayloadCookie]
  - target: permissions
    type: calls
    consumes: [getAccessResults]

mapping:
  paths:
    - packages/payload/src/auth/operations/
    - packages/payload/src/auth/executeAccess.ts
    - packages/payload/src/auth/defaultAccess.ts
    - packages/payload/src/auth/getAccessResults.ts
    - packages/payload/src/auth/isUserLocked.ts
    - packages/payload/src/auth/getLoginOptions.ts
    - packages/payload/src/auth/ensureUsernameOrEmail.ts
    - packages/payload/src/auth/extractAccessFromPermission.ts
