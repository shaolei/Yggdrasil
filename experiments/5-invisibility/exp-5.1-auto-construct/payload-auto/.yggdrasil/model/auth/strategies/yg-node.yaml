name: Auth Strategies
type: module

aspects:
  - aspect: parallel-safety
    exceptions:
      - "Only the local authenticate strategy uses parallel-safe DB access patterns; JWT and API key strategies are stateless lookups"

relations:
  - target: auth/token-management
    type: uses
    consumes: [extractJWT]

mapping:
  paths:
    - packages/payload/src/auth/strategies/
    - packages/payload/src/auth/executeAuthStrategies.ts
    - packages/payload/src/auth/extractJWT.ts
