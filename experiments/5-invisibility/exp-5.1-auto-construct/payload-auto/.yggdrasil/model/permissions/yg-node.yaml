name: Entity Permissions
type: module

aspects:
  - aspect: access-control
    anchors:
      - getEntityPermissions
      - populateFieldPermissions
      - entityDocExists

relations:
  - target: auth/operations
    type: uses
    consumes: [executeAccess]
    failure: "Throws if access function fails"

mapping:
  paths:
    - packages/payload/src/utilities/getEntityPermissions/
