name: APIView
type: service

aspects:
  - aspect: class-based-policy
    anchors:
      - authentication_classes
      - permission_classes
      - throttle_classes
      - get_authenticators
      - get_permissions
      - get_throttles

relations:
  - target: request-pipeline/request
    type: calls
    consumes: [Request, clone_request]
    failure: "Assertion error if request is not an HttpRequest instance"
  - target: request-pipeline/authentication
    type: uses
    consumes: [BaseAuthentication.authenticate, BaseAuthentication.authenticate_header]
    failure: "AuthenticationFailed → handle_exception → 401/403"
  - target: request-pipeline/permissions
    type: uses
    consumes: [BasePermission.has_permission, BasePermission.has_object_permission]
    failure: "PermissionDenied or NotAuthenticated → handle_exception"
  - target: request-pipeline/throttling
    type: uses
    consumes: [BaseThrottle.allow_request, BaseThrottle.wait]
    failure: "Throttled → handle_exception → 429 with Retry-After"

mapping:
  paths:
    - rest_framework/views.py
