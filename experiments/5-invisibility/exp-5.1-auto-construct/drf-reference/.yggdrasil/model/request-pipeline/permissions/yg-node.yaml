name: Permissions
type: infrastructure

aspects:
  - aspect: class-based-policy
    anchors:
      - BasePermission
      - has_permission
      - has_object_permission
  - aspect: operator-composition
    anchors:
      - OperationHolderMixin
      - OperandHolder
      - SingleOperandHolder
      - AND
      - OR
      - NOT

mapping:
  paths:
    - rest_framework/permissions.py
