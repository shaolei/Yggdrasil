name: Request
type: service

aspects:
  - aspect: lazy-evaluation
    anchors:
      - _authenticate
      - _load_data_and_files
      - Empty
      - wrap_attributeerrors
  - aspect: class-based-policy
    exceptions:
      - "Request does not configure policies itself; it receives pre-instantiated authenticators, parsers, and negotiator from APIView during initialize_request()"
    anchors:
      - authenticators
      - parsers
      - negotiator

relations:
  - target: request-pipeline/authentication
    type: uses
    consumes: [BaseAuthentication.authenticate]
    failure: "APIException → _not_authenticated() then re-raise"

mapping:
  paths:
    - rest_framework/request.py
