name: Upstreams
type: module

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - CaddyModule
      - Provision
  - aspect: upstream-availability
    anchors:
      - Available
      - Healthy
      - Full

relations:
  - target: reverse-proxy/health-checks
    type: uses
    consumes: [PassiveHealthChecks]

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/upstreams.go
    - modules/caddyhttp/reverseproxy/hosts.go
