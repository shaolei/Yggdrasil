name: Handler
type: module

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - CaddyModule
      - Provision
      - Cleanup
  - aspect: hop-by-hop-header-stripping
    anchors:
      - hopHeaders
      - removeConnectionHeaders
  - aspect: upstream-availability

relations:
  - target: reverse-proxy/selection-policies
    type: uses
    consumes: [Select]
  - target: reverse-proxy/transport
    type: uses
    consumes: [RoundTrip]
  - target: reverse-proxy/health-checks
    type: uses
    consumes: [countFailure, activeHealthChecker]
  - target: reverse-proxy/upstreams
    type: uses
    consumes: [GetUpstreams, fillDialInfo, Available]

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/reverseproxy.go
    - modules/caddyhttp/reverseproxy/streaming.go
    - modules/caddyhttp/reverseproxy/hosts.go
