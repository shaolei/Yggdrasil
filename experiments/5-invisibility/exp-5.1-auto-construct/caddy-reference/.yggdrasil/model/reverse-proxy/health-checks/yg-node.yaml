name: Health Checks
type: module

aspects:
  - aspect: caddy-module-pattern
    anchors:
      - Provision
  - aspect: upstream-availability
    anchors:
      - countFail
      - countHealthFail
      - setHealthy

relations:
  - target: reverse-proxy/upstreams
    type: uses
    consumes: [Host, setHealthy, countFail, countHealthFail, countHealthPass]
  - target: reverse-proxy/transport
    type: uses
    consumes: [RoundTrip]
    failure: "health check logged as error, upstream marked unhealthy"

mapping:
  paths:
    - modules/caddyhttp/reverseproxy/healthchecks.go
