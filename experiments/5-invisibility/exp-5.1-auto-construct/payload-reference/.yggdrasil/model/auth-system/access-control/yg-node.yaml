name: Access Control
type: module

aspects:
  - aspect: where-based-access-control
    anchors:
      - executeAccess
      - defaultAccess
      - getAccessResults

relations:
  - target: auth-system/entity-permissions
    type: calls
    consumes: [getEntityPermissions]

mapping:
  paths:
    - packages/payload/src/auth/executeAccess.ts
    - packages/payload/src/auth/defaultAccess.ts
    - packages/payload/src/auth/getAccessResults.ts
    - packages/payload/src/auth/operations/access.ts
