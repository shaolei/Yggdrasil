name: Auth Endpoints
type: service

aspects:
  - aspect: hook-lifecycle-pattern
    exceptions: ["Endpoints do not run hooks themselves — they delegate entirely to operations"]

relations:
  - target: auth-system/auth-operations
    type: calls
    consumes: [loginOperation, logoutOperation, refreshOperation, forgotPasswordOperation, resetPasswordOperation, accessOperation]
  - target: auth-system/auth-infrastructure
    type: calls
    consumes: [generatePayloadCookie, generateExpiredPayloadCookie]

mapping:
  paths:
    - packages/payload/src/auth/endpoints/
