name: Auth Operations
type: module

aspects:
  - aspect: hook-lifecycle-pattern
    anchors:
      - buildBeforeOperation
      - buildAfterOperation
      - beforeLogin
      - afterLogin
  - aspect: transaction-safety
    anchors:
      - initTransaction
      - commitTransaction
      - killTransaction
  - aspect: brute-force-protection
    anchors:
      - incrementLoginAttempts
      - resetLoginAttempts
      - checkLoginPermission
      - isUserLocked

relations:
  - target: auth-system/auth-infrastructure
    type: calls
    consumes: [authenticateLocalStrategy, generatePasswordSaltHash, jwtSign, addSessionToUser, revokeSession, removeExpiredSessions, getFieldsToSign]
  - target: auth-system/access-control
    type: calls
    consumes: [getAccessResults]

mapping:
  paths:
    - packages/payload/src/auth/operations/
    - packages/payload/src/auth/isUserLocked.ts
    - packages/payload/src/auth/getLoginOptions.ts
