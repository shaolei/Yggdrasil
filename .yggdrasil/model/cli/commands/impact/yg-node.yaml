name: ImpactCommand
type: library
description: "Blast radius analysis across node, aspect, and flow modes with optional simulation via yg impact"
aspects:
  - aspect: deterministic
  - aspect: cli-command-contract

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph, loadGraphFromRef]
  - target: cli/core/context
    type: uses
    consumes: [buildContext, collectAncestors, collectEffectiveAspectIds]
  - target: cli/core/drift-detector
    type: uses
    consumes: [detectDrift]
  - target: cli/commands/owner
    type: uses
    consumes: [findOwner]
  - target: cli/utils
    type: uses
    consumes: [projectRootFromGraph]
  - target: cli/model
    type: uses
    consumes: [Graph]

mapping:
  paths:
    - source/cli/src/cli/impact.ts
