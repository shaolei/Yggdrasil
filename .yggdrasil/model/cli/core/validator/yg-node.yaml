name: Validator
type: library
aspects:
  - aspect: deterministic
  - aspect: posix-paths

relations:
  - target: cli/core/context
    type: uses
    consumes: [buildContext, computeBudgetBreakdown]
  - target: cli/model
    type: uses
    consumes: [Graph, ValidationResult, ValidationIssue, ArtifactConfig, NodeAspectEntry]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths, getLastCommitTimestamp]

mapping:
  paths:
    - source/cli/src/core/validator.ts
