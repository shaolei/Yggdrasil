name: Validator
type: library
aspects: [deterministic]

relations:
  - target: cli/core/context
    type: uses
    consumes: [buildContext]
  - target: cli/model
    type: uses
    consumes: [Graph, ValidationResult, ValidationIssue, ArtifactConfig]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths, getLastCommitTimestamp]

mapping:
  paths:
    - source/cli/src/core/validator.ts
