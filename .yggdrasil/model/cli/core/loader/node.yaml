name: GraphLoader
type: library
aspects: [deterministic]

relations:
  - target: cli/io
    type: uses
    consumes: [parseConfig, parseNodeYaml, parseAspect, parseFlow, parseKnowledge, parseSchema, readArtifacts]
  - target: cli/model
    type: uses
    consumes: [Graph, GraphNode, YggConfig, AspectDef, FlowDef, KnowledgeItem, SchemaDef]
  - target: cli/utils
    type: uses
    consumes: [findYggRoot]

mapping:
  paths:
    - source/cli/src/core/graph-loader.ts
    - source/cli/src/core/graph-from-git.ts
