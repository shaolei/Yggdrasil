name: Entry
type: service
aspects:
  - aspect: cli-command-contract

relations:
  - target: cli/commands/init
    type: uses
    consumes: [registerInitCommand]
  - target: cli/commands/build-context
    type: uses
    consumes: [registerBuildCommand]
  - target: cli/commands/validation
    type: uses
    consumes: [registerValidateCommand]
  - target: cli/commands/drift
    type: uses
    consumes: [registerDriftCommand, registerDriftSyncCommand]
  - target: cli/commands/owner
    type: uses
    consumes: [registerOwnerCommand]
  - target: cli/commands/tree
    type: uses
    consumes: [registerTreeCommand]
  - target: cli/commands/deps
    type: uses
    consumes: [registerDepsCommand]
  - target: cli/commands/impact
    type: uses
    consumes: [registerImpactCommand]
  - target: cli/commands/status
    type: uses
    consumes: [registerStatusCommand]
  - target: cli/commands/aspects
    type: uses
    consumes: [registerAspectsCommand]
  - target: cli/commands/flows
    type: uses
    consumes: [registerFlowsCommand]
  - target: cli/commands/preflight
    type: uses
    consumes: [registerPreflightCommand]
  - target: cli/commands/select
    type: uses
    consumes: [registerSelectCommand]

mapping:
  paths:
    - source/cli/src/bin.ts
    - source/cli/package.json
