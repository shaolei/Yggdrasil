name: Entry
type: service
aspects: []

relations:
  - target: cli/commands/init
    type: uses
    consumes: [registerInitCommand]
  - target: cli/commands/validation
    type: uses
    consumes: [registerBuildCommand, registerValidateCommand]
  - target: cli/commands/drift
    type: uses
    consumes: [registerDriftCommand, registerDriftSyncCommand]
  - target: cli/commands/journal
    type: uses
    consumes: [registerJournalAddCommand, registerJournalReadCommand, registerJournalArchiveCommand]
  - target: cli/commands/graph-ops
    type: uses
    consumes: [registerStatusCommand, registerTreeCommand, registerOwnerCommand, registerDepsCommand, registerImpactCommand]

mapping:
  paths:
    - source/cli/src/bin.ts
    - source/cli/package.json
