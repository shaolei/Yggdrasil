# type: module | service | library | infrastructure
#   infrastructure — guards, resolvers, middleware, interceptors, validators
#     that modify/intercept request flow without being explicitly called by
#     business logic. Key for blast radius analysis.
name: ComponentName
type: service
aspects: []
aspect_exceptions:
  - aspect: aspect-id
    note: "Description of how this node deviates from the aspect pattern"

anchors:
  aspect-id:
    - functionName
    - CONSTANT_NAME
    - "SQL pattern"

blackbox: false

relations:
  - target: other/module-path
    type: calls
    consumes: [methodA, methodB]
    failure: "retry 3x, then circuit-break"

mapping:
  paths:
    - src/modules/component/
